<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double N</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#ffd6e7;
}

/* اللوقو */
.header{
  text-align:center;
  padding:20px;
}

.logo{
  font-size:32px;
  font-weight:bold;
  color:#555;
  background:pink;
  display:inline-block;
  padding:10px 25px;
  border-radius:20px;
}

/* الهيرو */
.hero{
  height:300px;
  background:url('https://images.unsplash.com/photo-1519014816548-bf5fe059798b') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.hero h1{
  background:rgba(0,0,0,.35);
  padding:15px 25px;
  border-radius:12px;
}

/* المنتجات */
.products{
  display:flex;
  justify-content:center;
  gap:25px;
  padding:40px;
  flex-wrap:wrap;
}

.card{
  background:white;
  width:220px;
  padding:15px;
  border-radius:15px;
  text-align:center;
}

.card img{
  width:100%;
  border-radius:10px;
}

button{
  background:#555;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:10px;
  cursor:pointer;
}

/* صفحة الدفع */
.checkout{
  display:none;
  background:white;
  width:320px;
  margin:40px auto;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

.checkout input{
  width:90%;
  padding:10px;
  margin:8px 0;
}

.note{
  color:#555;
  font-size:14px;
}
</style>
</head>

<body>

<header class="header">
  <div class="logo">Double N</div>
</header>

<section class="hero">
  <h1>أظافر نسائية مميزة</h1>
</section>

<section class="products" id="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604654894610-df63bc536371">
    <h3>اظافر A</h3>
    <p>35 ريال</p>
    <button onclick="showCheckout()">اطلب الآن</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1607779097040-26e80aa78e66">
    <h3>اظافر B</h3>
    <p>40 ريال</p>
    <button onclick="showCheckout()">اطلب الآن</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1610992015732-2449b76344bc">
    <h3>اظافر C</h3>
    <p>45 ريال</p>
    <button onclick="showCheckout()">اطلب الآن</button>
  </div>

</section>

<!-- صفحة الدفع -->
<div class="checkout" id="checkout">
  <h2>إتمام الطلب</h2>

  <input type="text" id="city" placeholder="المدينة">
  <input type="text" placeholder="رقم الجوال">
  <input type="text" placeholder="الموقع بالتفصيل">

  <p class="note">الدفع عند الاستلام — داخل الرياض فقط</p>

  <button onclick="validateCity()">تأكيد الطلب</button>

  <p id="msg"></p>
</div>

<script>
function showCheckout(){
  document.getElementById("products").style.display="none";
  document.getElementById("checkout").style.display="block";
  window.scrollTo(0,0);
}

function validateCity(){
  const city=document.getElementById("city").value.trim().toLowerCase();
  const msg=document.getElementById("msg");

  if(city!=="الرياض" && city!=="riyadh"){
    msg.style.color="red";
    msg.innerText="الخدمة داخل الرياض فقط";
  }else{
    msg.style.color="green";
    msg.innerText="تم استلام طلبك بنجاح ✅";
  }
}
</script>

</body>
</html>
