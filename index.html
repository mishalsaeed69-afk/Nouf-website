<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double N Beauty</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;scroll-behavior:smooth;}

body{background:#ffe3ef;color:#333;transition:.3s}

/* ===== Header ===== */
header{
background:white;
padding:18px 0;
text-align:center;
box-shadow:0 4px 12px rgba(0,0,0,.05);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:28px;
font-weight:700;
color:#444;
}

.logo span{color:#e91e63;}

.lang-btn{
position:absolute;
left:20px;
top:18px;
background:#444;
color:white;
border:none;
padding:6px 14px;
border-radius:20px;
cursor:pointer;
font-size:13px;
}

/* ===== Hero ===== */
.hero{
height:360px;
background:url('https://images.unsplash.com/photo-1632345031435-8727f6897d53') center/cover;
}

/* ===== Products ===== */
.products{
padding:60px 20px;
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.card{
background:white;
width:260px;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{transform:translateY(-8px);}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.card-body{padding:18px;text-align:center;}

.desc{
font-size:13px;
color:#777;
margin:6px 0 10px;
}

.price{
color:#e91e63;
font-weight:700;
margin-bottom:10px;
}

.qty{
width:80px;
padding:6px;
margin-bottom:10px;
}

.btn{
background:#444;
color:white;
border:none;
padding:10px 20px;
border-radius:30px;
cursor:pointer;
}

/* ===== Checkout ===== */
.checkout{
display:none;
max-width:420px;
margin:40px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
animation:fade .4s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.checkout input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ddd;
border-radius:10px;
}

.note{
font-size:13px;
color:#666;
margin:10px 0;
text-align:center;
}

.invoice{
display:none;
background:#f7f7f7;
padding:15px;
border-radius:12px;
margin-top:15px;
font-size:14px;
}

.error{color:red;text-align:center;margin-top:8px;}
</style>
</head>

<body>

<header>
<button class="lang-btn" onclick="toggleLang()">EN</button>
<div class="logo">Double N <span>Beauty</span></div>
</header>

<section class="hero"></section>

<section class="products" id="products">

<!-- المنتج A -->
<div class="card">
<img src="https://images.unsplash.com/photo-1604654894610-df63bc536371">
<div class="card-body">
<h3 class="t-nameA">اظافر A</h3>
<div class="desc t-desc">ناعم • قوي • عصري • سعر منافس</div>
<div class="price">35 ريال</div>
<select class="qty" id="qtyA">
<option value="1">1</option>
<option value="5">5</option>
<option value="10">10</option>
</select><br>
<button class="btn" onclick="orderProduct('اظافر A',35,'qtyA')">اطلب</button>
</div>
</div>

<!-- المنتج B -->
<div class="card">
<img src="https://images.unsplash.com/photo-1607779097040-26e80aa78e66">
<div class="card-body">
<h3 class="t-nameB">اظافر B</h3>
<div class="desc t-desc">ناعم • قوي • عصري • سعر منافس</div>
<div class="price">40 ريال</div>
<select class="qty" id="qtyB">
<option value="1">1</option>
<option value="5">5</option>
<option value="10">10</option>
</select><br>
<button class="btn" onclick="orderProduct('اظافر B',40,'qtyB')">اطلب</button>
</div>
</div>

<!-- المنتج C -->
<div class="card">
<img src="https://images.unsplash.com/photo-1610992015732-2449b76344bc">
<div class="card-body">
<h3 class="t-nameC">اظافر C</h3>
<div class="desc t-desc">ناعم • قوي • عصري • سعر منافس</div>
<div class="price">45 ريال</div>
<select class="qty" id="qtyC">
<option value="1">1</option>
<option value="5">5</option>
<option value="10">10</option>
</select><br>
<button class="btn" onclick="orderProduct('اظافر C',45,'qtyC')">اطلب</button>
</div>
</div>

</section>

<!-- Checkout -->
<div class="checkout" id="checkout">
<h2 id="t-checkout">إتمام الطلب</h2>

<input type="text" id="selectedProduct" readonly>
<input type="text" id="city" placeholder="المدينة">
<input type="tel" id="phone" placeholder="رقم الجوال">
<input type="text" id="location" placeholder="الموقع بالتفصيل">

<p class="note" id="t-note">الدفع عند الاستلام — داخل الرياض فقط</p>

<button class="btn" onclick="submitOrder()" id="t-confirm">تأكيد الطلب</button>

<div class="error" id="errorMsg"></div>

<div class="invoice" id="invoice"></div>
</div>

<script>
let currentLang="ar";
let orderData={};

function toggleLang(){
currentLang=currentLang==="ar"?"en":"ar";
document.documentElement.lang=currentLang;
document.documentElement.dir=currentLang==="ar"?"rtl":"ltr";

document.querySelector(".lang-btn").innerText=currentLang==="ar"?"EN":"AR";

if(currentLang==="en"){
document.querySelectorAll(".t-desc").forEach(e=>e.innerText="Soft • Strong • Modern • Competitive price");
document.querySelector(".t-nameA").innerText="Nails A";
document.querySelector(".t-nameB").innerText="Nails B";
document.querySelector(".t-nameC").innerText="Nails C";
document.getElementById("t-checkout").innerText="Checkout";
document.getElementById("t-note").innerText="Cash on delivery — Riyadh only";
document.getElementById("t-confirm").innerText="Confirm Order";
}else{
document.querySelectorAll(".t-desc").forEach(e=>e.innerText="ناعم • قوي • عصري • سعر منافس");
document.querySelector(".t-nameA").innerText="اظافر A";
document.querySelector(".t-nameB").innerText="اظافر B";
document.querySelector(".t-nameC").innerText="اظافر C";
document.getElementById("t-checkout").innerText="إتمام الطلب";
document.getElementById("t-note").innerText="الدفع عند الاستلام — داخل الرياض فقط";
document.getElementById("t-confirm").innerText="تأكيد الطلب";
}
}

function orderProduct(name,price,qtyId){
let qty=document.getElementById(qtyId).value;
orderData={name,price,qty,total:price*qty};

document.getElementById("selectedProduct").value=`${name} × ${qty}`;
document.getElementById("products").style.display="none";
document.getElementById("checkout").style.display="block";
window.scrollTo(0,0);
}

function submitOrder(){
let city=document.getElementById("city").value.trim().toLowerCase();
let error=document.getElementById("errorMsg");
let invoice=document.getElementById("invoice");

error.innerText="";
invoice.style.display="none";

if(city!=="الرياض" && city!=="riyadh"){
error.innerText=currentLang==="ar"?"الخدمة داخل الرياض فقط":"Riyadh only";
return;
}

invoice.style.display="block";
invoice.innerHTML=currentLang==="ar"
?`<b>تم تأكيد الطلب ✅</b><br><br>
المنتج: ${orderData.name}<br>
الكمية: ${orderData.qty}<br>
الإجمالي: ${orderData.total} ريال`
:`<b>Order Confirmed ✅</b><br><br>
Product: ${orderData.name}<br>
Qty: ${orderData.qty}<br>
Total: ${orderData.total} SAR`;
}
</script>

</body>
</html>
