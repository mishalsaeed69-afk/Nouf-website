<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double N</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#ffd6e7;
}

/* ===== اللوقو ===== */
.header{
  text-align:center;
  padding:20px;
}

.logo{
  font-size:34px;
  font-weight:bold;
  color:#555;
  background:#ffc0cb;
  display:inline-block;
  padding:12px 30px;
  border-radius:25px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* ===== الهيرو ===== */
.hero{
  height:320px;
  background:url('https://images.unsplash.com/photo-1632345031435-8727f6897d53') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.hero h1{
  background:rgba(0,0,0,.35);
  padding:16px 28px;
  border-radius:14px;
  font-size:28px;
}

/* ===== المنتجات ===== */
.products{
  display:flex;
  justify-content:center;
  gap:25px;
  padding:40px;
  flex-wrap:wrap;
}

.card{
  background:white;
  width:230px;
  padding:15px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  transition:.25s;
}

.card:hover{
  transform:translateY(-6px);
}

.card img{
  width:100%;
  border-radius:12px;
}

button{
  background:#555;
  color:white;
  border:none;
  padding:11px 22px;
  border-radius:12px;
  cursor:pointer;
  font-size:15px;
}

/* ===== صفحة الدفع ===== */
.checkout{
  display:none;
  background:white;
  width:340px;
  margin:50px auto;
  padding:30px 25px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.checkout h2{
  margin-bottom:15px;
  color:#333;
}

.checkout input{
  width:92%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

.note{
  color:#666;
  font-size:13px;
  margin:10px 0 15px;
}

.success{
  background:#e8ffe8;
  color:#1b7a1b;
  padding:10px;
  border-radius:10px;
  margin-top:12px;
  display:none;
  font-weight:bold;
}

.error{
  color:red;
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<header class="header">
  <div class="logo">Double N</div>
</header>

<section class="hero">
  <h1>أظافر نسائية مميزة</h1>
</section>

<section class="products" id="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604654894610-df63bc536371">
    <h3>اظافر A</h3>
    <p>35 ريال</p>
    <button onclick="showCheckout()">اطلب الآن</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1607779097040-26e80aa78e66">
    <h3>اظافر B</h3>
    <p>40 ريال</p>
    <button onclick="showCheckout()">اطلب الآن</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1610992015732-2449b76344bc">
    <h3>اظافر C</h3>
    <p>45 ريال</p>
    <button onclick="showCheckout()">اطلب الآن</button>
  </div>

</section>

<!-- ===== صفحة الدفع ===== -->
<div class="checkout" id="checkout">
  <h2>إتمام الطلب</h2>

  <input type="text" id="city" placeholder="المدينة">
  <input type="tel" placeholder="رقم الجوال">
  <input type="text" placeholder="الموقع بالتفصيل">

  <p class="note">الدفع عند الاستلام — متاح داخل الرياض فقط</p>

  <button onclick="validateCity()">تأكيد الطلب</button>

  <div class="success" id="successMsg">
    ✅ تم تأكيد طلبك بنجاح — سيتم التواصل معك قريباً
  </div>

  <p id="errorMsg" class="error"></p>
</div>

<script>
function showCheckout(){
  document.getElementById("products").style.display="none";
  document.getElementById("checkout").style.display="block";
  window.scrollTo(0,0);
}

function validateCity(){
  const city=document.getElementById("city").value.trim().toLowerCase();
  const success=document.getElementById("successMsg");
  const error=document.getElementById("errorMsg");

  success.style.display="none";
  error.innerText="";

  if(city!=="الرياض" && city!=="riyadh"){
    error.innerText="❌ الخدمة متاحة داخل الرياض فقط";
  }else{
    success.style.display="block";
  }
}
</script>

</body>
</html>
